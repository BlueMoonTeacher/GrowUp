<!DOCTYPE html>
<html lang="ko" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="성장기록" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="format-detection" content="telephone=no" />
    <title>학급 성장 기록장</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Seedling/3D/seedling_3d.png" />
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Seedling/3D/seedling_3d.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'primary': '#22c55e',
              'primary-focus': '#16a34a',
              'primary-content': '#ffffff',

              'secondary': '#f0fdf4',
              'secondary-focus': '#dcfce7',
              'secondary-content': '#14532d',

              'accent': '#facc15',

              'neutral': '#f3f4f6',
              'base-100': '#ffffff',
              'base-200': '#f9fafb',
              'base-300': '#e5e7eb',

              'base-content': '#1f2937',
              'base-content-secondary': '#6b7280',
            },
            boxShadow: {
                'lg': '0 10px 15px -3px rgb(0 0 0 / 0.07), 0 4px 6px -4px rgb(0 0 0 / 0.07)',
                'xl': '0 20px 25px -5px rgb(0 0 0 / 0.07), 0 8px 10px -6px rgb(0 0 0 / 0.07)',
            },
            borderRadius: {
                'xl': '1rem',
                '2xl': '1.5rem',
            }
          }
        }
      }
    </script>
    <style>
      /* iOS/iPadOS PWA standalone 모드에서 safe-area 인셋까지 꽉 채우도록 설정 */
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sar: env(safe-area-inset-right, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
      }

      html, body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        overscroll-behavior: none;
        background-color: #f3f4f6 !important;
        color: #1f2937 !important;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      /* PWA standalone 모드 전용: safe-area 보정 */
      @media (display-mode: standalone) {
        body {
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          box-sizing: border-box;
        }
      }

      #root {
        height: 100%;
        width: 100%;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #f3f4f6 !important;
          color: #1f2937 !important;
        }
      }

      .custom-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .custom-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        opacity: 0.6;
        filter: invert(0.4);
        transition: opacity 0.2s;
      }

      input[type="date"]::-webkit-calendar-picker-indicator:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
