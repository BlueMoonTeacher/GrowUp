<!DOCTYPE html>
<html lang="ko" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="학급 성장 기록장" />
    <meta name="description" content="Google 로그인으로 개별 사용 모드에서 이용하는 학급 성장 기록장" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="학급 성장 기록장" />
    <meta property="og:site_name" content="학급 성장 기록장" />
    <meta property="og:description" content="Google 로그인으로 개별 사용 모드에서 이용하는 학급 성장 기록장" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="학급 성장 기록장" />
    <meta name="twitter:description" content="Google 로그인으로 개별 사용 모드에서 이용하는 학급 성장 기록장" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="format-detection" content="telephone=no" />
    <title>학급 성장 기록장</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/seedling-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/seedling-icon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'primary': '#22c55e',
              'primary-focus': '#16a34a',
              'primary-content': '#ffffff',

              'secondary': '#f0fdf4',
              'secondary-focus': '#dcfce7',
              'secondary-content': '#14532d',

              'accent': '#facc15',

              'neutral': '#f3f4f6',
              'base-100': '#ffffff',
              'base-200': '#f9fafb',
              'base-300': '#e5e7eb',

              'base-content': '#1f2937',
              'base-content-secondary': '#6b7280',
            },
            boxShadow: {
                'lg': '0 10px 15px -3px rgb(0 0 0 / 0.07), 0 4px 6px -4px rgb(0 0 0 / 0.07)',
                'xl': '0 20px 25px -5px rgb(0 0 0 / 0.07), 0 8px 10px -6px rgb(0 0 0 / 0.07)',
            },
            borderRadius: {
                'xl': '1rem',
                '2xl': '1.5rem',
            }
          }
        }
      }
    </script>
    <style>
      /* iOS/iPadOS PWA standalone 모드에서 safe-area 인셋까지 꽉 채우도록 설정 */
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sar: env(safe-area-inset-right, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
      }

      html, body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        overscroll-behavior: none;
        background-color: #f3f4f6 !important;
        color: #1f2937 !important;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      /* PWA standalone 모드 전용: safe-area 보정 */
      @media (display-mode: standalone) {
        body {
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          box-sizing: border-box;
        }
      }

      #root {
        height: 100%;
        width: 100%;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #f3f4f6 !important;
          color: #1f2937 !important;
        }
      }

      *::-webkit-scrollbar {
        display: none;
      }

      * {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .custom-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .custom-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        opacity: 0.6;
        filter: invert(0.4);
        transition: opacity 0.2s;
      }

      input[type="date"]::-webkit-calendar-picker-indicator:hover {
        opacity: 1;
      }

      /* 세로형 태블릿/모니터에서는 남는 하단 공간을 체크리스트에 사용한다. */
      @media (orientation: portrait) and (min-width: 768px) {
        .schedule-checklist-grid {
          min-height: min(42rem, calc(100dvh - 8rem));
        }

        .schedule-checklist-card {
          min-height: 32rem;
        }

        .schedule-checklist-list {
          min-height: 23rem;
          max-height: none !important;
        }
      }

      .attendance-print-sheet {
        display: none;
      }

      @media print {
        @page {
          size: A4 portrait;
          margin: 7mm;
        }

        html,
        body,
        #root {
          width: auto !important;
          height: auto !important;
          margin: 0 !important;
          padding: 0 !important;
          overflow: visible !important;
          background: #fff !important;
        }

        body > #root {
          display: none !important;
        }

        .attendance-print-sheet {
          position: static;
          display: block !important;
          box-sizing: border-box;
          width: 100%;
          color: #262626;
          background: #fff;
          font-family: "Malgun Gothic", "Noto Sans KR", Arial, sans-serif;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        .neis-print-page {
          position: relative;
          box-sizing: border-box;
          width: 100%;
          min-height: 280mm;
          padding-bottom: 18mm;
          break-after: page;
          page-break-after: always;
        }

        .neis-print-page:last-child {
          break-after: auto;
          page-break-after: auto;
        }

        .neis-print-date {
          height: 4mm;
          text-align: right;
          font-size: 8pt;
        }

        .neis-print-title {
          margin: 1mm 0 5mm;
          color: #c56500;
          text-align: center;
          font-size: 20pt;
          font-weight: 700;
          letter-spacing: 0.5mm;
        }

        .neis-print-class-info {
          display: flex;
          justify-content: space-between;
          margin: 0 1mm 3mm;
          font-size: 9pt;
        }

        .neis-monthly-grid {
          width: 100%;
          table-layout: fixed;
          border-collapse: collapse;
          font-size: 6.5pt;
          line-height: 1;
        }

        .neis-monthly-grid th,
        .neis-monthly-grid td {
          box-sizing: border-box;
          overflow: hidden;
          border: 0.25mm solid #202020;
          padding: 0.25mm 0.1mm;
          text-align: center;
          white-space: nowrap;
        }

        .neis-monthly-grid thead th {
          height: 13mm;
          vertical-align: middle;
          font-weight: 400;
        }

        .neis-monthly-grid thead th > span {
          display: block;
          margin-bottom: 1mm;
        }

        .neis-monthly-grid thead .neis-number-column,
        .neis-monthly-grid thead .neis-name-column {
          vertical-align: middle;
          font-size: 8pt;
        }

        .neis-monthly-grid .neis-number-column {
          width: 10mm;
        }

        .neis-monthly-grid .neis-name-column {
          width: 23mm;
        }

        .neis-monthly-grid tbody td {
          height: 4.2mm;
          font-size: 7pt;
        }

        .neis-monthly-grid .neis-student-name {
          padding-left: 0;
          text-align: center;
          font-size: 7.5pt;
        }

        .neis-statistics-table {
          width: 100%;
          table-layout: fixed;
          border-collapse: collapse;
          margin-top: 10mm;
          font-size: 7.5pt;
        }

        .neis-statistics-table th,
        .neis-statistics-table td {
          height: 7mm;
          border: 0.25mm solid #202020;
          text-align: center;
          font-weight: 400;
        }

        .neis-first-detail-block {
          margin-top: 10mm;
        }

        .neis-detail-table {
          width: 100%;
          table-layout: fixed;
          border-collapse: collapse;
          font-size: 7.5pt;
        }

        .neis-detail-table th,
        .neis-detail-table td {
          height: 7mm;
          border: 0.25mm solid #202020;
          padding: 0.8mm 1mm;
          text-align: center;
          vertical-align: middle;
        }

        .neis-detail-table th {
          font-weight: 400;
        }

        .neis-detail-table th:nth-child(1),
        .neis-detail-table td:nth-child(1) {
          width: 11mm;
        }

        .neis-detail-table th:nth-child(2),
        .neis-detail-table td:nth-child(2) {
          width: 23mm;
        }

        .neis-detail-table th:nth-child(3),
        .neis-detail-table td:nth-child(3) {
          width: 22mm;
          white-space: nowrap;
        }

        .neis-detail-table th:nth-child(4),
        .neis-detail-table td:nth-child(4) {
          width: 29mm;
          white-space: nowrap;
        }

        .neis-detail-table th:nth-child(5),
        .neis-detail-table td:nth-child(5) {
          width: 47mm;
          white-space: nowrap;
        }

        .neis-detail-empty {
          height: 10mm !important;
          text-align: center;
        }

        .neis-print-continuation-page {
          padding-top: 8mm;
        }

        .neis-print-continuation-page .neis-print-date {
          margin-bottom: 2mm;
        }

        .neis-print-footer {
          position: absolute;
          right: 1mm;
          bottom: 2mm;
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          gap: 8mm;
          font-size: 6pt;
          color: #444;
        }

        .neis-print-footer strong {
          font-size: 8pt;
          font-weight: 400;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
